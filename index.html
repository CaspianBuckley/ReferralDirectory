<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='utf-8'/>
  <meta name='viewport' content='width=device-width, initial-scale=1'/>
  <title>Surrey Referral Pathways</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
  :root {
    --bg:        #F2F5F8;
    --surface:   #FFFFFF;
    --surface-2: #F7F9FB;
    --border:    #E0E7EE;
    --border-lt: #EEF2F6;
    --ink:       #0C1A27;
    --ink-2:     #3A5068;
    --ink-3:     #7A92A6;
    --ink-4:     #B0C4D4;

    /* Brand — deep teal-navy */
    --brand:     #0B4F6C;
    --brand-mid: #1270A0;
    --brand-lt:  #E0EEF6;
    --brand-xlt: #F0F6FB;

    /* Accents */
    --red:       #C0182E;
    --red-lt:    #FEF0F2;
    --green:     #0A7048;
    --green-lt:  #EDFAF3;
    --amber:     #B45309;
    --amber-lt:  #FFFBEB;
    --purple:    #5B21B6;
    --purple-lt: #F3EFFE;

    --r-sm: 8px;
    --r:    12px;
    --r-lg: 18px;
    --r-xl: 24px;

    --sh0: 0 1px 3px rgba(10,25,45,.06), 0 1px 2px rgba(10,25,45,.04);
    --sh1: 0 4px 16px rgba(10,25,45,.08), 0 1px 4px rgba(10,25,45,.05);
    --sh2: 0 12px 40px rgba(10,25,45,.12), 0 4px 12px rgba(10,25,45,.06);
    --sh-brand: 0 4px 20px rgba(11,79,108,.22);

    --hdr: 58px;
    --ff-display: 'Fraunces', Georgia, serif;
    --ff-body: 'DM Sans', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--ff-body);
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.55;
    min-height: 100vh;
  }

  /* ─────────────────────── HEADER ─────────────────────── */
  .site-header {
    background: var(--brand);
    height: var(--hdr);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 28px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 0 rgba(255,255,255,.06), var(--sh-brand);
  }

  /* subtle diagonal stripe texture */
  .site-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      -55deg,
      transparent,
      transparent 18px,
      rgba(255,255,255,.025) 18px,
      rgba(255,255,255,.025) 19px
    );
    pointer-events: none;
  }

  .site-logo {
    display: flex;
    align-items: center;
    gap: 11px;
    position: relative;
    z-index: 1;
    text-decoration: none;
  }
  .logo-mark {
    width: 32px; height: 32px;
    background: rgba(255,255,255,.15);
    border: 1px solid rgba(255,255,255,.22);
    border-radius: 8px;
    display: grid;
    place-items: center;
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .04em;
    color: rgba(255,255,255,.92);
    flex-shrink: 0;
  }
  .logo-text {
    font-family: var(--ff-display);
    font-weight: 600;
    font-size: 1.05rem;
    color: #fff;
    letter-spacing: -.01em;
    line-height: 1.1;
  }
  .logo-sub {
    font-family: var(--ff-body);
    font-size: .66rem;
    font-weight: 500;
    color: rgba(255,255,255,.5);
    letter-spacing: .04em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .tabs {
    margin-left: auto;
    display: flex;
    gap: 2px;
    background: rgba(0,0,0,.22);
    padding: 3px;
    border-radius: 10px;
    position: relative;
    z-index: 1;
  }
  .tab-btn {
    background: transparent;
    color: rgba(255,255,255,.6);
    border: none;
    border-radius: 8px;
    padding: 6px 18px;
    font-family: var(--ff-body);
    font-weight: 600;
    font-size: .8rem;
    cursor: pointer;
    transition: all .18s;
    white-space: nowrap;
    letter-spacing: .01em;
  }
  .tab-btn[aria-selected='true'] {
    background: #fff;
    color: var(--brand);
    box-shadow: var(--sh0);
  }
  .tab-btn:hover:not([aria-selected='true']) {
    color: #fff;
    background: rgba(255,255,255,.1);
  }

  /* ─────────────────────── LAYOUT ─────────────────────── */
  .view { display: none; }
  .view.active { display: block; }
  .wrap { max-width: 1160px; margin: 0 auto; padding: 28px 22px 70px; }

  /* ─────────────────────── SEARCH HEADER ─────────────────────── */
  .search-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 18px 20px 16px;
    margin-bottom: 26px;
    box-shadow: var(--sh1);
  }

  .search-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--r);
    padding: 10px 15px;
    transition: all .18s;
    margin-bottom: 14px;
  }
  .search-row:focus-within {
    border-color: var(--brand-mid);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(18,112,160,.1);
  }
  .search-icon {
    flex-shrink: 0;
    color: var(--ink-3);
    display: flex;
  }
  #global-search, #usc-search {
    flex: 1;
    border: none;
    outline: none;
    font-size: .93rem;
    font-family: var(--ff-body);
    background: transparent;
    color: var(--ink);
  }
  #global-search::placeholder, #usc-search::placeholder { color: var(--ink-3); }

  /* ─────────────────────── FILTER ROW ─────────────────────── */
  .filter-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-label {
    font-size: .68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--ink-3);
    white-space: nowrap;
    margin-right: 1px;
    flex-shrink: 0;
  }
  .chip {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-family: var(--ff-body);
    font-weight: 600;
    font-size: .76rem;
    cursor: pointer;
    color: var(--ink-2);
    transition: all .15s;
    white-space: nowrap;
    line-height: 1.5;
  }
  .chip:hover { border-color: var(--brand-mid); background: var(--brand-xlt); color: var(--brand); }
  .chip.active { background: var(--brand); border-color: var(--brand); color: #fff; }

  .filter-divider { width: 1px; height: 18px; background: var(--border); margin: 0 4px; flex-shrink: 0; }

  .age-slider-wrap {
    display: flex; align-items: center; gap: 8px; margin-left: auto;
  }
  #age-slider { width: 110px; accent-color: var(--brand); cursor: pointer; }
  #age-slider-value { font-size: .76rem; font-weight: 700; color: var(--brand); min-width: 28px; }

  /* ─────────────────────── SEARCH RESULTS DROPDOWN ─────────────────────── */
  #search-results, #usc-search-results {
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    background: var(--surface);
    box-shadow: var(--sh2);
    overflow: hidden;
    margin-top: 6px;
  }
  #search-results:empty, #usc-search-results:empty { display: none; }
  .search-hit {
    padding: 10px 15px;
    border-bottom: 1px solid var(--border-lt);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 2px;
    transition: background .12s;
  }
  .search-hit:last-child { border-bottom: none; }
  .search-hit:hover { background: var(--brand-xlt); }
  .search-hit-title { font-weight: 600; font-size: .87rem; color: var(--ink); }
  .search-hit-path { font-size: .74rem; color: var(--ink-3); }

  /* ─────────────────────── SECTION LABEL ─────────────────────── */
  .section-label {
    font-family: var(--ff-body);
    font-size: .67rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--ink-3);
    margin-bottom: 14px;
  }

  /* ─────────────────────── CATEGORY GRID ─────────────────────── */
  .category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(188px, 1fr));
    gap: 10px;
  }

  .category-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--r);
    padding: 20px 16px 16px;
    box-shadow: var(--sh0);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: border-color .18s, box-shadow .18s, transform .18s;
    position: relative;
    overflow: hidden;
  }
  /* coloured left accent bar */
  .category-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 3px;
    background: var(--cat-color, var(--brand));
    border-radius: 2px 0 0 2px;
    opacity: 0;
    transition: opacity .18s;
  }
  .category-card:hover {
    border-color: var(--brand-mid);
    box-shadow: var(--sh1);
    transform: translateY(-2px);
  }
  .category-card:hover::before { opacity: 1; }

  .cat-emoji { font-size: 1.65rem; line-height: 1; display: block; }
  .cat-title {
    font-family: var(--ff-display);
    font-weight: 600;
    font-size: .95rem;
    line-height: 1.25;
    color: var(--ink);
  }
  .cat-sub {
    font-size: .72rem;
    color: var(--ink-3);
    font-weight: 500;
    margin-top: -4px;
  }

  /* ─────────────────────── VIEW HEADER ─────────────────────── */
  #category-view, #results-view { animation: fadeUp .22s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: none; }
  }

  .view-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: var(--r-sm);
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-family: var(--ff-body);
    font-weight: 600;
    font-size: .8rem;
    color: var(--ink-2);
    cursor: pointer;
    transition: all .15s;
    box-shadow: var(--sh0);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .back-btn:hover { border-color: var(--brand-mid); color: var(--brand); background: var(--brand-xlt); }
  .back-btn svg { flex-shrink: 0; }

  .view-title {
    font-family: var(--ff-display);
    font-size: 1.35rem;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: -.01em;
    line-height: 1.2;
  }
  .title-emoji { margin-right: 6px; }

  .count-pill {
    margin-left: auto;
    background: var(--brand-lt);
    color: var(--brand);
    border: 1px solid rgba(18,112,160,.2);
    padding: 5px 13px;
    border-radius: 20px;
    font-weight: 700;
    font-size: .75rem;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ─────────────────────── SUBSPECIALTY GRID ─────────────────────── */
  .subspec-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 8px;
    margin-bottom: 28px;
  }
  .subspec-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--r-sm);
    padding: 12px 15px;
    cursor: pointer;
    font-weight: 600;
    font-size: .86rem;
    color: var(--ink-2);
    transition: all .15s;
    box-shadow: var(--sh0);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .subspec-card:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-xlt); box-shadow: var(--sh1); }
  .subspec-card.active { background: var(--brand); color: #fff; border-color: var(--brand); }
  .subspec-arrow { opacity: .3; font-size: .8rem; transition: opacity .15s, transform .15s; }
  .subspec-card:hover .subspec-arrow { opacity: .7; transform: translateX(2px); }
  .subspec-card.active .subspec-arrow { opacity: .6; }

  .conditions-row { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 20px; }

  /* ─────────────────────── SERVICE CARDS ─────────────────────── */
  .provider-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    margin-bottom: 14px;
    overflow: hidden;
    box-shadow: var(--sh0);
    transition: box-shadow .15s;
  }
  .provider-section:hover { box-shadow: var(--sh1); }

  .provider-header {
    padding: 12px 18px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border-lt);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .provider-icon { font-size: .95rem; opacity: .7; }
  .provider-name {
    font-family: var(--ff-display);
    font-weight: 600;
    font-size: .9rem;
    color: var(--ink);
    letter-spacing: -.01em;
  }
  .provider-count {
    margin-left: auto;
    font-size: .68rem;
    font-weight: 700;
    color: var(--ink-3);
    background: var(--border-lt);
    padding: 2px 8px;
    border-radius: 10px;
  }

  .service-card {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border-lt);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px 16px;
    align-items: start;
    transition: background .12s;
  }
  .service-card:last-child { border-bottom: none; }
  .service-card:hover { background: var(--brand-xlt); }

  .svc-title {
    font-family: var(--ff-display);
    font-weight: 600;
    font-size: .95rem;
    color: var(--ink);
    margin-bottom: 3px;
    line-height: 1.3;
    letter-spacing: -.01em;
  }
  .svc-sub {
    font-size: .76rem;
    color: var(--ink-3);
    margin-bottom: 9px;
    font-weight: 500;
  }

  /* eRS pathway section */
  .ers-pathway-block {
    background: var(--brand-xlt);
    border: 1px solid rgba(18,112,160,.15);
    border-radius: var(--r-sm);
    padding: 9px 12px;
    margin-bottom: 10px;
  }
  .ers-pathway-label {
    font-size: .64rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--brand-mid);
    margin-bottom: 6px;
  }

  .badge-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
  .badge {
    padding: 3px 9px;
    border-radius: 6px;
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .01em;
    white-space: nowrap;
  }
  /* pathway type chips — reuse .chip but smaller */
  .ers-pathway-block .chip {
    font-size: .7rem;
    padding: 3px 10px;
    background: rgba(18,112,160,.08);
    border-color: rgba(18,112,160,.2);
    color: var(--brand);
  }
  .badge-blue   { background: var(--brand-lt); color: var(--brand); border: 1px solid rgba(18,112,160,.25); }
  .badge-red    { background: var(--red-lt); color: var(--red); border: 1px solid rgba(192,24,46,.18); }
  .badge-green  { background: var(--green-lt); color: var(--green); border: 1px solid rgba(10,112,72,.18); }
  .badge-purple { background: var(--purple-lt); color: var(--purple); border: 1px solid rgba(91,33,182,.18); }

  .svc-details { display: flex; flex-direction: column; gap: 5px; }
  .svc-detail-row {
    font-size: .77rem;
    color: var(--ink-2);
    display: flex;
    gap: 7px;
    align-items: flex-start;
    line-height: 1.45;
  }
  .svc-detail-label {
    font-weight: 700;
    color: var(--ink-3);
    min-width: 44px;
    flex-shrink: 0;
    font-size: .7rem;
    text-transform: uppercase;
    letter-spacing: .04em;
    padding-top: 1px;
  }
  .svc-notes {
    font-size: .77rem;
    color: var(--ink-2);
    background: var(--amber-lt);
    border: 1px solid #FDE68A;
    border-radius: var(--r-sm);
    padding: 8px 11px;
    margin-top: 8px;
    line-height: 1.5;
  }

  .svc-meta-col {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    padding-top: 3px;
  }
  .age-badge {
    font-size: .68rem;
    font-weight: 700;
    color: var(--ink-3);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    white-space: nowrap;
  }

  /* ─────────────────────── USC PANEL ─────────────────────── */
  #panel-usc .search-header { margin-bottom: 22px; }

  /* ─────────────────────── EMPTY / LOADING ─────────────────────── */
  .empty-state {
    text-align: center;
    padding: 64px 20px;
    color: var(--ink-3);
  }
  .empty-state .big { font-size: 2.8rem; margin-bottom: 12px; }
  .empty-state p { font-size: .9rem; }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 64px;
    color: var(--ink-3);
    font-weight: 600;
    font-size: .9rem;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--brand);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─────────────────────── RESPONSIVE ─────────────────────── */
  @media (max-width: 600px) {
    .wrap { padding: 16px 14px 50px; }
    .category-grid { grid-template-columns: repeat(2, 1fr); gap: 9px; }
    .site-header { padding: 0 16px; }
    .logo-text { font-size: .92rem; }
    .filter-row { gap: 5px; }
    .age-slider-wrap { margin-left: 0; margin-top: 8px; width: 100%; }
    .view-title { font-size: 1.1rem; }
  }
  </style>
</head>
<body>

  <header class='site-header'>
    <a class='site-logo' href='#'>
      <div class='logo-mark'>ICB</div>
      <div>
        <div class='logo-text'>Surrey Referral Pathways</div>
        <div class='logo-sub'>Integrated Care Board</div>
      </div>
    </a>
    <nav class='tabs' role='tablist'>
      <button id='tab-ur'  class='tab-btn' role='tab' aria-selected='true'  aria-controls='panel-ur' >Routine &amp; Urgent</button>
      <button id='tab-usc' class='tab-btn' role='tab' aria-selected='false' aria-controls='panel-usc'>USC / 2WW</button>
    </nav>
  </header>

  <main class='wrap'>

    <!-- ══════════════ ROUTINE & URGENT ══════════════ -->
    <section id='panel-ur' class='view active' aria-labelledby='tab-ur'>

      <!-- HOME: search + filters + grid -->
      <div id='home-view' class='view active'>
        <div class='search-header'>
          <div class='search-row'>
            <span class='search-icon'>
              <svg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.3' stroke-linecap='round' stroke-linejoin='round'>
                <circle cx='11' cy='11' r='8'/><path d='m21 21-4.35-4.35'/>
              </svg>
            </span>
            <input id='global-search' type='text' autocomplete='off' placeholder='Search service, specialty, condition, provider or site…'/>
          </div>
          <div id='search-results'></div>

          <div class='filter-row'>
            <span class='filter-label'>Area</span>
            <div id='ur-region' style='display:contents'>
              <button class='chip active' data-area=''>All</button>
              <button class='chip' data-area='NW Surrey'>NW Surrey</button>
              <button class='chip' data-area='East Surrey'>East Surrey</button>
              <button class='chip' data-area='Surrey Downs'>Surrey Downs</button>
              <button class='chip' data-area='Guildford &amp; Waverley'>Guildford &amp; Waverley</button>
              <button class='chip' data-area='East Elmbridge'>East Elmbridge</button>
            </div>
            <div class='filter-divider'></div>
            <span class='filter-label'>Age</span>
            <button class='age-chip chip active' data-age='all'>All</button>
            <button class='age-chip chip' data-age='adult'>Adult</button>
            <button class='age-chip chip' data-age='paeds'>Paeds</button>
            <div class='age-slider-wrap'>
              <input id='age-slider' type='range' min='0' max='120' value='0' step='1'/>
              <span id='age-slider-value'>0+</span>
            </div>
          </div>
        </div>

        <div class='section-label'>Browse by clinical area</div>
        <div id='category-grid' class='category-grid'>
          <div class='loading'><div class='spinner'></div> Loading services…</div>
        </div>
      </div>

      <!-- CATEGORY: subspecialties -->
      <div id='category-view' class='view'>
        <div class='view-header'>
          <button class='back-btn' id='back-to-home'>
            <svg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><path d='M19 12H5'/><path d='m12 19-7-7 7-7'/></svg>
            Back
          </button>
          <div class='view-title' id='cat-view-title'></div>
        </div>
        <div class='section-label'>Sub-specialties</div>
        <div id='subspec-grid' class='subspec-grid'></div>
      </div>

      <!-- RESULTS: service cards -->
      <div id='results-view' class='view'>
        <div class='view-header'>
          <button class='back-btn' id='back-to-cat'>
            <svg width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><path d='M19 12H5'/><path d='m12 19-7-7 7-7'/></svg>
            Back
          </button>
          <div class='view-title' id='results-title'></div>
          <div class='count-pill' id='results-count'></div>
        </div>
        <div class='conditions-row' id='condition-list'></div>
        <div id='results-body'></div>
      </div>

    </section>

    <!-- ══════════════ USC / 2WW ══════════════ -->
    <section id='panel-usc' class='view' aria-labelledby='tab-usc'>
      <div class='search-header'>
        <div class='search-row'>
          <span class='search-icon'>
            <svg width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.3' stroke-linecap='round' stroke-linejoin='round'>
              <circle cx='11' cy='11' r='8'/><path d='m21 21-4.35-4.35'/>
            </svg>
          </span>
          <input id='usc-search' type='text' autocomplete='off' placeholder='Search USC cancer type, provider or service…'/>
        </div>
        <div id='usc-search-results'></div>
        <div class='filter-row'>
          <span class='filter-label'>Area</span>
          <div id='usc-region' style='display:contents'>
            <button class='chip active' data-area=''>All</button>
            <button class='chip' data-area='NW Surrey'>NW Surrey</button>
            <button class='chip' data-area='East Surrey'>East Surrey</button>
            <button class='chip' data-area='Surrey Downs'>Surrey Downs</button>
            <button class='chip' data-area='Guildford &amp; Waverley'>Guildford &amp; Waverley</button>
            <button class='chip' data-area='East Elmbridge'>East Elmbridge</button>
          </div>
        </div>
      </div>
      <div class='section-label' style='margin-top:4px'>USC cancer pathways</div>
      <div id='usc-grid' class='category-grid'></div>
      <div id='usc-results' style='margin-top:20px'></div>
    </section>

  </main>

  <script src='hybrid-loader.js'></script>
</body>
</html>
